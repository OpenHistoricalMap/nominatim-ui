user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log    /var/log/nginx/access.log;
    sendfile      on;
    keepalive_timeout  65;

    upstream nominatim_backend {
        server 127.0.0.1:8080;
    }

    # Detect ?format=html
    map $args $format {
        default                  default;
        ~(^|&)format=html(&|$)   html;
        ~(^|&)format=            other;
    }

    # Determine if redirect is needed
    map $uri/$format $forward_to_ui {
        default               1;
        ~^/ui                 0;
        ~/other$              0;
        ~/reverse.*/default   0;
        ~/lookup.*/default    0;
    }

    server {
        listen 80;
        server_name localhost;

        # Serve static UI files from /ui/
        location /ui/ {
            alias /usr/share/nginx/html/ui/;
            index index.html;
        }

        # Redirect root to UI
        location = / {
            return 302 /ui/search.html;
        }

        # Redirect to UI if format=html
        location ~ ^/(search|reverse|lookup)$ {
            if ($forward_to_ui) {
                return 302 /ui$uri.html$is_args$args;
            }

            proxy_pass http://nominatim_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy direct .php endpoints
        location ~ \.php$ {
            proxy_pass http://nominatim_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Serve other static assets (e.g. favicon, css, js)
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
